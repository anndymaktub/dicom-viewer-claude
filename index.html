<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DICOM Viewer</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="layout">
    <div id="mainContainer">
      <canvas id="mainCanvas"></canvas>
    </div>

    <div id="resizeDivider"></div>
    <div id="subPanel">
      <div id="subPanelTitle">Histogram</div>
      <div id="histContainer">
        <div id="histToolbar" aria-label="Histogram zoom controls">
          <button id="histZoomInBtn" class="hist-tool-btn" title="Zoom in" aria-label="Zoom in histogram">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <circle cx="11" cy="11" r="7"></circle>
              <path d="M16.5 16.5L21 21"></path>
              <path d="M11 8v6"></path>
              <path d="M8 11h6"></path>
            </svg>
          </button>
          <button id="histZoomOutBtn" class="hist-tool-btn" title="Zoom out" aria-label="Zoom out histogram">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <circle cx="11" cy="11" r="7"></circle>
              <path d="M16.5 16.5L21 21"></path>
              <path d="M8 11h6"></path>
            </svg>
          </button>
          <button id="histZoomResetBtn" class="hist-tool-btn" title="Reset histogram zoom" aria-label="Reset histogram zoom">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M4 7v5h5"></path>
              <path d="M5.7 16A7 7 0 1 0 6 7.8L4 12"></path>
            </svg>
          </button>
          <button id="histPanBtn" class="hist-tool-btn" title="Pan histogram" aria-label="Pan histogram" aria-pressed="false">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M8 11V6a2 2 0 0 1 4 0v5"></path>
              <path d="M12 10V5a2 2 0 0 1 4 0v7"></path>
              <path d="M16 12V8a2 2 0 0 1 4 0v5"></path>
              <path d="M8 11a2 2 0 1 0-4 0v3c0 4 3 7 7 7h3c3 0 6-3 6-6v-2"></path>
            </svg>
          </button>
        </div>
        <canvas id="histCanvas"></canvas>
        <div id="histResizeGrip" title="Resize histogram"></div>
      </div>

      <div id="histDivider"></div>
      <div id="controlsWrap">
      <div id="controlsArea">

        <!-- ① Window / Level -->
        <div class="ctrl-section">
          <div class="info-row">
            <span class="info-label">Window Center</span>
            <span id="wcDisplay" class="val-highlight">--</span>
          </div>
          <div class="info-row">
            <span class="info-label">Window Width</span>
            <span id="wwDisplay" class="val-highlight">--</span>
          </div>
          <div class="info-row" id="monoRow" style="display:none">
            <label class="toggle-label">
              <input type="checkbox" id="invertMonoCheck" checked>
              <span>MONOCHROME1 → 2 反轉</span>
            </label>
          </div>
          <button id="resetBtn">重設原始 Window 設定</button>
          <div class="help-hint">拖曳黃色邊界調整 WW &nbsp;|&nbsp; 拖曳中央調整 WC</div>
        </div>

        <!-- ② Display Options -->
        <div class="ctrl-section">
          <div class="section-header" data-target="dispContent">
            <span>顯示選項</span><span class="chevron">▾</span>
          </div>
          <div id="dispContent" class="section-body">
            <label class="toggle-label">
              <input type="checkbox" id="showOverlayCheck" checked>
              <span>影像資訊覆蓋</span>
            </label>
            <label class="toggle-label">
              <input type="checkbox" id="smoothInterpCheck" checked>
              <span>平滑插值縮放</span>
            </label>
            <label class="toggle-label">
              <input type="checkbox" id="manualInvertCheck">
              <span>手動反轉顯示</span>
            </label>
            <label class="toggle-label">
              <input type="checkbox" id="showPixelValueCheck" checked>
              <span>游標像素值</span>
            </label>
            <label class="toggle-label">
              <input type="checkbox" id="showRulerCheck">
              <span>比例尺</span>
            </label>
          </div>
        </div>

        <!-- ③ Rendering Pipeline Tags -->
        <div class="ctrl-section" id="renderPipelineSection" style="display:none">
          <div class="section-header" data-target="renderPipelineContent">
            <span>渲染流程 Tags</span><span class="chevron">▾</span>
          </div>
          <div id="renderPipelineContent" class="section-body">
            <div id="renderPipelineGrid"></div>
          </div>
        </div>

        <!-- ④ DICOM Info -->
        <div class="ctrl-section" id="dicomInfoSection" style="display:none">
          <div class="section-header" data-target="dicomContent">
            <span>DICOM 影像資訊</span><span class="chevron">▾</span>
          </div>
          <div id="dicomContent" class="section-body">
            <div id="dicomInfoGrid"></div>
          </div>
        </div>

        <!-- ⑤ All Tags -->
        <div class="ctrl-section" id="allTagsSection" style="display:none">
          <div class="section-header" data-target="allTagsContent">
            <span>所有 DICOM Tags</span><span class="chevron">▾</span>
          </div>
          <div id="allTagsContent" class="section-body">
            <input type="text" id="tagSearchInput" placeholder="搜尋 Tag ID / 名稱 / 值…" autocomplete="off">
            <div id="allTagsCount" class="tags-count"></div>
            <div id="allTagsList"></div>
          </div>
        </div>

      </div><!-- /controlsArea -->
      </div><!-- /controlsWrap -->
    </div><!-- /subPanel -->
  </div>

  <div id="statusBar">就緒 &nbsp;|&nbsp; 請使用「檔案 &gt; 載入」開啟 DICOM 檔案</div>

  <!-- Tag right-click context menu -->
  <div id="tagCtxMenu">
    <div id="tagCtxCopyAll">📋 複製全部 Tags</div>
    <div id="tagCtxCopyRow">📄 複製此列 (ID + 名稱 + 值)</div>
    <div id="tagCtxCopyVal">🔢 複製此列的值</div>
  </div>

  <script src="renderer.js"></script>
</body>
</html>
